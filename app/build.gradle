apply plugin: 'com.android.application'

android {
    compileSdkVersion 33
    
    defaultConfig {
        minSdkVersion 26
        targetSdkVersion 33
        applicationId "com.wifiscanner"
    }
    
    buildTypes {
        release {
            minifyEnabled true
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.10.1'
}
