name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate debug keystore if not present
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -storepass android \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias androiddebugkey \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storetype PKCS12
            echo "KEYSTORE_GENERATED=true" >> $GITHUB_ENV
          fi

      - name: Commit keystore back to repo (first run)
        if: env.KEYSTORE_GENERATED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/debug.keystore
          git commit -m "Add debug keystore for consistent signing [skip ci]"
          git push

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wifi-lock-debug
          path: app/build/outputs/apk/debug/app-debug.apk
